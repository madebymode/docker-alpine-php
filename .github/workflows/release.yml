name: Build Docker Images

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  discover-buildable-images:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Discover buildable image directories
        id: discover
        run: |
          MATRIX=$(
            find . -path './.git' -prune -o -mindepth 2 -maxdepth 2 -type d -print | sort | while read -r dir; do
              type="${dir#./}"
              type="${type%/*}"
              version="${dir##*/}"
              if [[ -f "$dir/.env" && -f "$dir/Dockerfile" ]]; then
                printf '{"type":"%s","version":"%s"}\n' "$type" "$version"
              fi
            done | jq -cs .
          )

          if [[ "$MATRIX" == "[]" ]]; then
            echo "No buildable image directories found." >&2
            exit 1
          fi

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  create-release-and-build:
    needs: discover-buildable-images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(needs.discover-buildable-images.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup GitHub CLI
        run: |
          gh auth login --with-token <<< "${{ secrets.GITHUB_TOKEN }}"

      - name: Set up environment variables
        run: |
          DIR=${{ matrix.type }}/${{ matrix.version }}
          if [[ ! -f "$DIR/.env" || ! -f "$DIR/Dockerfile" ]]; then
            echo "Missing .env or Dockerfile in $DIR" >&2
            exit 1
          fi

          set -a
          source "$DIR/.env"
          set +a

          IMAGE_REPO="${IMAGE_REPO:-mxmd/php}"
          TAG_MODE="legacy"

          if [[ -n "${IMAGE_TAG:-}" ]]; then
            TAG_MODE="custom"
            IMAGE_TAG_PREFIX="${IMAGE_TAG}"
            RELEASE_TITLE="Docker image ${IMAGE_REPO}:${IMAGE_TAG}"
            DOCKER_HUB_LINK="https://hub.docker.com/r/${IMAGE_REPO}/tags?page=1&name=${IMAGE_TAG}"
            BUILD_TAGS="${IMAGE_REPO}:${IMAGE_TAG}"
          else
            VARIANT=""
            if [[ "${{ matrix.version }}" == *"-mssql" ]]; then
              VARIANT="-mssql"
            fi
            IMAGE_TAG="${PHP_VERSION}${VARIANT}-${{ matrix.type }}"
            IMAGE_MAJOR_TAG="${PHP_VERSION_MAJOR}${VARIANT}-${{ matrix.type }}"
            IMAGE_TAG_PREFIX="${IMAGE_TAG}"
            RELEASE_TITLE="PHP ${PHP_VERSION}${VARIANT} (${{ matrix.type }}) release"
            DOCKER_HUB_LINK="https://hub.docker.com/r/${IMAGE_REPO}/tags?page=1&name=${IMAGE_TAG}"
            BUILD_TAGS="${IMAGE_REPO}:${IMAGE_TAG}"$'\n'"${IMAGE_REPO}:${IMAGE_MAJOR_TAG}"
          fi

          for VAR_NAME in DIR PLATFORM PHP_VERSION PHP_VERSION_MAJOR ALPINE_VERSION IMAGE_REPO IMAGE_TAG IMAGE_TAG_PREFIX IMAGE_MAJOR_TAG TAG_MODE RELEASE_TITLE DOCKER_HUB_LINK; do
            echo "$VAR_NAME=${!VAR_NAME}" >> "$GITHUB_ENV"
          done

          {
            echo 'BUILD_TAGS<<EOF'
            printf '%s\n' "$BUILD_TAGS"
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Create Release
        run: |
          if ! gh release view "$IMAGE_TAG_PREFIX" > /dev/null 2>&1; then
            gh release create "$IMAGE_TAG_PREFIX" \
              --title "$RELEASE_TITLE" \
              --notes "Docker image for ${IMAGE_REPO}:${IMAGE_TAG}. [View on Docker Hub](${DOCKER_HUB_LINK})"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print environment variables for debugging
        run: |
          echo "DIR:          $DIR"
          echo "PHP_VERSION:  $PHP_VERSION"
          echo "PHP_MAJOR:    $PHP_VERSION_MAJOR"
          echo "ALPINE:       $ALPINE_VERSION"
          echo "IMAGE_REPO:   $IMAGE_REPO"
          echo "IMAGE_TAG:    $IMAGE_TAG"
          echo "TAG_MODE:     $TAG_MODE"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0
        with:
          image: tonistiigi/binfmt:qemu-v8.1.5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Log in to DHI
        if: ${{ matrix.type == 'fpm-hardened' }}
        uses: docker/login-action@v4.0.0
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Generate build timestamp
        run: echo "BUILD_TIMESTAMP=$(date +'%Y%m%d%H%M')" >> "$GITHUB_ENV"

      - name: Prepare push tags
        run: |
          if [[ "$TAG_MODE" == "custom" ]]; then
            PUSH_TAGS="${IMAGE_REPO}:${IMAGE_TAG}"
            PUSH_TAGS+=$'\n'"${IMAGE_REPO}:${IMAGE_TAG}-${BUILD_TIMESTAMP}"
          else
            PUSH_TAGS="${IMAGE_REPO}:${IMAGE_TAG}"
            PUSH_TAGS+=$'\n'"${IMAGE_REPO}:${IMAGE_MAJOR_TAG}"
            PUSH_TAGS+=$'\n'"${IMAGE_REPO}:${IMAGE_TAG}-${BUILD_TIMESTAMP}"
            PUSH_TAGS+=$'\n'"${IMAGE_REPO}:${IMAGE_MAJOR_TAG}-${BUILD_TIMESTAMP}"
          fi

          {
            echo 'PUSH_TAGS<<EOF'
            printf '%s\n' "$PUSH_TAGS"
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Push Docker image
        id: push-image
        uses: docker/build-push-action@v7.0.0
        with:
          context: ./${{ matrix.type }}
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true
          attests: type=sbom,generator=docker/scout
          tags: ${{ env.PUSH_TAGS }}
          build-args: |
            PHP_VERSION=${{ env.PHP_VERSION }}
            PHP_VERSION_MAJOR=${{ env.PHP_VERSION_MAJOR }}
            ALPINE_VERSION=${{ env.ALPINE_VERSION }}
            ALPINE_IMAGE=alpine:${{ env.ALPINE_VERSION }}
          file: ${{ env.DIR }}/Dockerfile

      - name: Publish digest tag on GitHub
        if: ${{ steps.push-image.outputs.digest != '' }}
        env:
          IMAGE_DIGEST: ${{ steps.push-image.outputs.digest }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIGEST_HEX="${IMAGE_DIGEST#sha256:}"
          DIGEST_TAG="${IMAGE_TAG_PREFIX}-sha256-${DIGEST_HEX}"
          TAG_LINES=$(printf '%s\n' "$PUSH_TAGS")
          PUBLISHED_TAGS=$(printf '%s\n' "$TAG_LINES" | sed 's/^/- `/; s/$/`/')
          DIGEST_REFS=$(printf '%s\n' "$TAG_LINES" | sed "s/$/@${IMAGE_DIGEST}/" | sed 's/^/- `/; s/$/`/')
          RELEASE_NOTES=$(cat <<EOF
          Immutable Docker manifest digest for ${IMAGE_REPO}:${IMAGE_TAG}

          Docker digest: \`${IMAGE_DIGEST}\`
          Published tags:
          ${PUBLISHED_TAGS}
          Digest references:
          ${DIGEST_REFS}
          Docker Hub tags: ${DOCKER_HUB_LINK}
          EOF
          )

          if ! gh release view "${DIGEST_TAG}" > /dev/null 2>&1; then
            gh release create "${DIGEST_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "Docker digest ${DIGEST_TAG}" \
              --notes "${RELEASE_NOTES}"
          fi
