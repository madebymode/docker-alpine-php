name: Create Releases and Build Docker images

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version:
          - '7.1'
          - '7.2'
          - '7.3'
          - '7.4'
          - '8.0'
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.4-mssql'
          - '8.5'
        type:
          - cli
          - fpm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup GitHub CLI
        run: |
          gh auth login --with-token <<< "${{ secrets.GITHUB_TOKEN }}"

      - name: Create Release (with variant detection)
        run: |
          DIR=${{ matrix.type }}/${{ matrix.version }}
          if [[ -f "$DIR/.env" ]]; then
            set -a; source $DIR/.env; set +a
            # detect “-mssql” suffix in the folder name
            if [[ "${{ matrix.version }}" == *"-mssql" ]]; then
              VARIANT="-mssql"
            else
              VARIANT=""
            fi
            TAG_NAME="${PHP_VERSION}${VARIANT}-${{ matrix.type }}"
            DOCKER_HUB_LINK="https://hub.docker.com/r/mxmd/php/tags?page=1&name=${TAG_NAME}"
            if ! gh release view "$TAG_NAME" > /dev/null 2>&1; then
              gh release create "$TAG_NAME" \
                --title "PHP $PHP_VERSION${VARIANT} (${{ matrix.type }}) release" \
                --notes "Docker image for PHP $PHP_VERSION${VARIANT} (${{ matrix.type }}). [View on Docker Hub]($DOCKER_HUB_LINK)"
              echo "RELEASE_CREATED=true" >> $GITHUB_ENV
            fi
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up environment variables
        run: |
          DIR=${{ matrix.type }}/${{ matrix.version }}
          if [[ -f "$DIR/.env" ]]; then
            set -a; source $DIR/.env; set +a
            # capture PHP vars
            for VAR_NAME in PLATFORM PHP_VERSION PHP_VERSION_MAJOR ALPINE_VERSION; do
              echo "$VAR_NAME=${!VAR_NAME}" >> $GITHUB_ENV
            done
            # variant flag for tagging
            if [[ "${{ matrix.version }}" == *"-mssql" ]]; then
              echo "VARIANT=-mssql" >> $GITHUB_ENV
            else
              echo "VARIANT=" >> $GITHUB_ENV
            fi
            echo "IMAGE_TAG_PREFIX=${PHP_VERSION}${VARIANT}-${{ matrix.type }}" >> $GITHUB_ENV
          else
            echo "No .env file found in $DIR" >&2
            exit 1
          fi

      - name: Print environment variables for debugging
        run: |
          echo "PHP_VERSION:  $PHP_VERSION"
          echo "PHP_MAJOR:    $PHP_VERSION_MAJOR"
          echo "VARIANT:      $VARIANT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0
        with:
          image: tonistiigi/binfmt:qemu-v8.1.5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # ── BUILD ───────────────────────────────────────────────────────────────

      - name: Build Docker images (regular)
        if: "!contains(matrix.version, '-mssql')"
        uses: docker/build-push-action@v7.0.0
        with:
          context: ./${{ matrix.type }}
          push: false
          platforms: linux/amd64,linux/arm64
          tags: |
            mxmd/php:${{ env.PHP_VERSION }}-${{ matrix.type }}
            mxmd/php:${{ env.PHP_VERSION_MAJOR }}-${{ matrix.type }}
          build-args: |
            PHP_VERSION=${{ env.PHP_VERSION }}
            PHP_VERSION_MAJOR=${{ env.PHP_VERSION_MAJOR }}
            ALPINE_VERSION=${{ env.ALPINE_VERSION }}
            ALPINE_IMAGE=alpine:${{ env.ALPINE_VERSION }}
          file: ${{ matrix.type }}/${{ matrix.version }}/Dockerfile

      - name: Build Docker images (MSSQL)
        if: contains(matrix.version, '-mssql')
        uses: docker/build-push-action@v7.0.0
        with:
          context: ./${{ matrix.type }}
          push: false
          platforms: linux/amd64,linux/arm64
          tags: |
            mxmd/php:${{ env.PHP_VERSION }}${{ env.VARIANT }}-${{ matrix.type }}
            mxmd/php:${{ env.PHP_VERSION_MAJOR }}${{ env.VARIANT }}-${{ matrix.type }}
          build-args: |
            PHP_VERSION=${{ env.PHP_VERSION }}
            PHP_VERSION_MAJOR=${{ env.PHP_VERSION_MAJOR }}
            ALPINE_VERSION=${{ env.ALPINE_VERSION }}
            ALPINE_IMAGE=alpine:${{ env.ALPINE_VERSION }}
          file: ${{ matrix.type }}/${{ matrix.version }}/Dockerfile

      - name: Generate build timestamp
        id: build-timestamp
        run: echo "BUILD_TIMESTAMP=$(date +'%Y%m%d%H%M')" >> $GITHUB_ENV

      # ── PUSH ────────────────────────────────────────────────────────────────

      - name: Push Docker images (regular)
        id: push-regular
        if: "!contains(matrix.version, '-mssql')"
        uses: docker/build-push-action@v7.0.0
        with:
          context: ./${{ matrix.type }}
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true
          attests: type=sbom,generator=docker/scout
          tags: |
            mxmd/php:${{ env.PHP_VERSION }}-${{ matrix.type }}
            mxmd/php:${{ env.PHP_VERSION_MAJOR }}-${{ matrix.type }}
            mxmd/php:${{ env.PHP_VERSION }}-${{ matrix.type }}-${{ env.BUILD_TIMESTAMP }}
            mxmd/php:${{ env.PHP_VERSION_MAJOR }}-${{ matrix.type }}-${{ env.BUILD_TIMESTAMP }}
          build-args: |
            PHP_VERSION=${{ env.PHP_VERSION }}
            PHP_VERSION_MAJOR=${{ env.PHP_VERSION_MAJOR }}
            ALPINE_VERSION=${{ env.ALPINE_VERSION }}
            ALPINE_IMAGE=alpine:${{ env.ALPINE_VERSION }}
          file: ${{ matrix.type }}/${{ matrix.version }}/Dockerfile

      - name: Push Docker images (MSSQL)
        id: push-mssql
        if: contains(matrix.version, '-mssql')
        uses: docker/build-push-action@v7.0.0
        with:
          context: ./${{ matrix.type }}
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true
          attests: type=sbom,generator=docker/scout
          tags: |
            mxmd/php:${{ env.PHP_VERSION }}${{ env.VARIANT }}-${{ matrix.type }}
            mxmd/php:${{ env.PHP_VERSION_MAJOR }}${{ env.VARIANT }}-${{ matrix.type }}
            mxmd/php:${{ env.PHP_VERSION }}${{ env.VARIANT }}-${{ matrix.type }}-${{ env.BUILD_TIMESTAMP }}
            mxmd/php:${{ env.PHP_VERSION_MAJOR }}${{ env.VARIANT }}-${{ matrix.type }}-${{ env.BUILD_TIMESTAMP }}
          build-args: |
            PHP_VERSION=${{ env.PHP_VERSION }}
            PHP_VERSION_MAJOR=${{ env.PHP_VERSION_MAJOR }}
            ALPINE_VERSION=${{ env.ALPINE_VERSION }}
            ALPINE_IMAGE=alpine:${{ env.ALPINE_VERSION }}
          file: ${{ matrix.type }}/${{ matrix.version }}/Dockerfile

      - name: Publish digest tag on GitHub
        if: ${{ steps.push-regular.outputs.digest != '' || steps.push-mssql.outputs.digest != '' }}
        env:
          IMAGE_DIGEST: ${{ steps.push-regular.outputs.digest || steps.push-mssql.outputs.digest }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIGEST_HEX="${IMAGE_DIGEST#sha256:}"
          DIGEST_TAG="${IMAGE_TAG_PREFIX}-sha256-${DIGEST_HEX}"
          IMAGE_REF="mxmd/php:${IMAGE_TAG_PREFIX}"
          IMAGE_MAJOR_REF="mxmd/php:${PHP_VERSION_MAJOR}${VARIANT}-${{ matrix.type }}"
          IMAGE_TIMESTAMP_REF="mxmd/php:${IMAGE_TAG_PREFIX}-${BUILD_TIMESTAMP}"
          IMAGE_MAJOR_TIMESTAMP_REF="mxmd/php:${PHP_VERSION_MAJOR}${VARIANT}-${{ matrix.type }}-${BUILD_TIMESTAMP}"
          DOCKER_HUB_LINK="https://hub.docker.com/r/mxmd/php/tags?page=1&name=${IMAGE_TAG_PREFIX}"

          if ! gh release view "${DIGEST_TAG}" > /dev/null 2>&1; then
            gh release create "${DIGEST_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "Docker digest ${DIGEST_TAG}" \
              --notes "Immutable Docker manifest digest for ${IMAGE_REF}

Docker digest: \`${IMAGE_DIGEST}\`
Published tags:
- \`${IMAGE_REF}\`
- \`${IMAGE_MAJOR_REF}\`
- \`${IMAGE_TIMESTAMP_REF}\`
- \`${IMAGE_MAJOR_TIMESTAMP_REF}\`
Digest references:
- \`${IMAGE_REF}@${IMAGE_DIGEST}\`
- \`${IMAGE_MAJOR_REF}@${IMAGE_DIGEST}\`
- \`${IMAGE_TIMESTAMP_REF}@${IMAGE_DIGEST}\`
- \`${IMAGE_MAJOR_TIMESTAMP_REF}@${IMAGE_DIGEST}\`
Docker Hub tags: ${DOCKER_HUB_LINK}"
          fi
