name: CodeQL

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
  schedule:
    - cron: '31 4 * * 1'

permissions:
  security-events: write
  packages: read
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze Go
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
          build-mode: manual

      - name: Build FastCGI health probe
        run: |
          cd fpm-hardened/_shared
          go mod init fcgi-health
          CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o /tmp/fcgi-health .

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
